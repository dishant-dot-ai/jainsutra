<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — JainAwaken</title>
  <meta name="description" content="Jain philosophy explained clearly and accessibly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/topic.css">
</head>
<body>

  <!-- Reading Progress -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">JainAwaken</a>
      <ul class="nav__links" id="navLinks">
        <li><a href="navkar.html">Navkar Mantra</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <button class="nav__hamburger" id="navToggle" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <!-- Hero: Editorial Asymmetry -->
  <header class="tp-hero">
    <div class="tp-hero__inner">
      <div class="tp-hero__text">
        <span class="tp-hero__label" id="topicLabel"></span>
        <h1 class="tp-hero__title" id="topicTitle"></h1>
        <div class="tp-hero__sanskrit-row">
          <span class="tp-hero__sanskrit" id="topicSanskrit"></span>
          <div class="tp-hero__line"></div>
        </div>
        <p class="tp-hero__tagline" id="topicTagline"></p>
      </div>
      <div class="tp-hero__img-col">
        <div class="tp-hero__img-wrap">
          <img src="" alt="" class="tp-hero__img" id="heroBg">
          <div class="tp-hero__img-gradient"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Deep Dive Section -->
  <section class="tp-deep">
    <div class="tp-deep__inner">
      <div class="tp-deep__sidebar">
        <h2 class="tp-deep__sidebar-title">The Essence</h2>
        <div class="tp-deep__toc" id="deepToc"></div>
      </div>
      <div class="tp-deep__content">
        <p class="tp-deep__lead" id="deepLead"></p>
        <div class="tp-deep__divider"></div>
        <div class="tp-deep__body" id="deepBody"></div>
        <!-- CTA -->
        <div class="tp-deep__cta">
          <a href="" class="tp-deep__btn" id="ctaBtn">
            <span>Begin the Contemplation</span>
            <span class="tp-deep__btn-arrow">→</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Key Terms: Horizontal Grid -->
  <section class="tp-terms">
    <div class="tp-terms__inner">
      <span class="tp-terms__label">Key Concepts</span>
      <div class="tp-terms__header">
        <h3 class="tp-terms__heading" id="termsHeading"></h3>
        <p class="tp-terms__sub" id="termsSub"></p>
      </div>
      <div class="tp-terms__grid" id="keyTerms"></div>
    </div>
  </section>

  <!-- Closing Quote -->
  <section class="tp-quote">
    <div class="tp-quote__inner">
      <blockquote class="tp-quote__text" id="quoteText"></blockquote>
    </div>
  </section>

  <!-- Connected Topics -->
  <section class="tp-connected">
    <div class="tp-connected__inner">
      <span class="tp-connected__label">Related Concepts</span>
      <div class="tp-connected__grid" id="connectedGrid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer__tagline">JainAwaken</p>
      <p class="footer__credit">The path, not the diet.</p>
    </div>
  </footer>

  <script src="js/topics-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/topic-page.js"></script>
</body>
</html>
